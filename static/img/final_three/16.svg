<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 360">
  <!-- ground -->
  <rect x="0" y="295" width="500" height="65" fill="#c0d4a0"/>
  <!-- foreground hills -->
  <ellipse cx="80" cy="296" rx="100" ry="20" fill="#a8c285"/>
  <ellipse cx="430" cy="296" rx="110" ry="22" fill="#a8c285"/>
  <!-- mountain -->
  <polygon points="55,295 250,68 445,295" fill="#c0b8d0" stroke="#2a2a2a" stroke-width="4" stroke-linejoin="round"/>
  <!-- snow cap -->
  <polygon points="212,122 250,68 288,122 268,114 250,90 232,114" fill="#faf8f4" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <!-- winding path up mountain -->
  <polyline points="180,295 200,260 185,230 210,200 200,170 228,140 250,110" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,5"/>
  <!-- sun upper left -->
  <circle cx="88" cy="88" r="38" fill="#f8c060" stroke="#2a2a2a" stroke-width="3"/>
  <!-- sun rays -->
  <line x1="88" y1="38" x2="88" y2="22" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="125" y1="53" x2="137" y2="41" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="138" y1="88" x2="154" y2="88" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="125" y1="123" x2="137" y2="135" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="51" y1="53" x2="39" y2="41" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="88" x2="22" y2="88" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="51" y1="123" x2="39" y2="135" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
</svg>
